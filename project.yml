name: Chaselog
options:
  bundleIdPrefix: com.shimondeitel.chaselog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Chaselog:
    type: application
    platform: iOS
    sources:
      - path: Chaselog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chaselog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Chaselog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ChaselogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChaselogTests
      - path: Chaselog.storekit
    dependencies:
      - target: Chaselog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chaselog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ChaselogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ChaselogUITests
    dependencies:
      - target: Chaselog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chaselog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Chaselog:
    build:
      targets:
        Chaselog: all
        ChaselogTests: [test]
        ChaselogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Chaselog.storekit
    test:
      config: Debug
      storeKitConfiguration: Chaselog.storekit
      targets:
        - ChaselogTests
        - ChaselogUITests
    archive:
      config: Release
